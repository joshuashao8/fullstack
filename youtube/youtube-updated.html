<style>
    /* 1. CSS Reset */
*, *::before, *::after {
  box-sizing: border-box;
}

body, h1, h2, p, ul {
  margin: 0;
  padding: 0;
}

img {
  max-width: 100%;
  display: block;
}

/* 2. YouTube Background Color & Global Font */
body {
  font-family: "Roboto", "Arial", sans-serif;
  background-color: #0f0f0f; /* YouTube's exact dark mode background */
  color: #f1f1f1;            /* Bright off-white for text */
  padding: 24px;
}

/* 3. The Pro Grid Layout System */
.main-container {
  display: grid;
  /* Automatically crams as many columns as will fit, with a minimum width of 260px each */
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  column-gap: 16px;
  row-gap: 40px; /* YouTube leaves a massive vertical gap between card rows */
  max-width: 1800px;
  margin: 0 auto;
}

/* 4. The Card Wrapper */
.card {
  width: 100%; /* Spans the full width of whatever grid column it belongs to */
  background-color: transparent; /* True YouTube rows don't have card background colors */
  cursor: pointer;
}

/* 5. Thumbnail Styling */
.thumbnail-img {
  width: 100%;
  aspect-ratio: 16 / 9; /* Guarantees the thumbnail stays perfectly proportioned */
  border-radius: 12px;  /* Modern YouTube rounded video corners */
  object-fit: cover;
  transition: border-radius 0.15s ease;
}

/* When hovering over the video, corners sharpen slightly just like real YT */
.card:hover .thumbnail-img {
  border-radius: 4px;
}

/* 6. Detail Layout Block */
.detail {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  margin-top: 12px;
  padding: 0 4px;
}

/* Channel Avatar Circle */
.avatar {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  object-fit: cover;
}

/* Vertical text bucket */
.text-detail {
  display: flex;
  flex-direction: column;
}

/* Video Title Typography */
h1.video-title {
  font-size: 14px;
  font-weight: 500;
  line-height: 1.4;
  color: #f1f1f1;
  margin-bottom: 4px;
  /* Standard YouTube multi-line truncation trick */
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

/* Channel Name and Meta Stats Typography */
h2.channel-name, 
h2.video-stats {
  font-size: 12px;
  font-weight: 400;
  color: #aaa; /* Soft gray for lower hierarchy metadata */
  line-height: 1.5;
}

h2.channel-name:hover {
  color: #fff; /* Highlights channel name on hover */
}
</style>
